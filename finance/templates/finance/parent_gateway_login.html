<!-- finance/templates/finance/parent_gateway_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescent Heights Academy — Secure Parent Portal Gate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1.5rem; }
        .login-card { background: #ffffff; border: 1px solid #dde5f7; border-radius: 24px; box-shadow: 0 20px 40px rgba(10,22,40,0.05); max-width: 460px; width: 100%; padding: 3.5rem 2.5rem; position: relative; }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: #2563eb; border-radius: 24px 24px 0 0; }
        .portal-icon { width: 60px; height: 60px; border-radius: 16px; background: #eff6ff; color: #2563eb; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.6rem; box-shadow: 0 4px 12px rgba(37,99,235,0.1); }
        .login-card h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: #0a1628; margin-bottom: 0.4rem; text-align: center; }
        .login-card p.subtitle { color: #64748b; font-size: 0.9rem; text-align: center; margin-bottom: 2.5rem; line-height: 1.5; }
        .form-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-bottom: 0.5rem; }
        .input-group-text { background: #f8fafc; border: 1px solid #dde5f7; color: #64748b; border-radius: 12px 0 0 12px; padding-left: 1.2rem; padding-right: 1.2rem; }
        .form-control { border: 1px solid #dde5f7; border-radius: 0 12px 12px 0; padding: 0.8rem 1.2rem; font-size: 0.92rem; color: #0a1628; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
        .btn-portal { background: #2563eb; color: #ffffff; font-weight: 700; font-size: 0.95rem; padding: 0.9rem; border-radius: 100px; width: 100%; border: none; transition: all 0.2s ease; box-shadow: 0 4px 14px rgba(37,99,235,0.25); margin-top: 1.5rem; }
        .btn-portal:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.4); }
        .btn-home { display: block; text-align: center; color: #94a3b8; font-size: 0.85rem; font-weight: 500; text-decoration: none; margin-top: 1.5rem; transition: color 0.2s ease; }
        .btn-home:hover { color: #0a1628; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="portal-icon">
        <i class="bi bi-person-badge-fill"></i>
    </div>
    <h2>Parent Security Access</h2>
    <p class="subtitle">Please provide your registered mobile line alongside your official National ID Card Number.</p>

    <!-- Feedback Alerts Display -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger border-0 small py-2.5 text-center rounded-3 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1.5"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'parent_portal_gateway' %}">
        {% csrf_token %}
        
        <!-- 1. Phone Verification Input -->
        <div class="mb-3.5">
            <label class="form-label">Registered Mobile Number</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                <input type="text" name="parent_phone" class="form-control" placeholder="e.g. 0722334455" required>
            </div>
        </div>

        <!-- 2. Parent National ID Card Input -->
        <div class="mb-4">
            <label class="form-label">National ID Number</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-shield-check-fill"></i></span>
                <input type="text" name="parent_id_number" class="form-control" placeholder="e.g. 24681012" required autocomplete="off">
            </div>
        </div>

        <button type="submit" class="btn btn-portal">Authorize Secure Console Access</button>
        <a href="{% url 'public_home' %}" class="btn-home"><i class="bi bi-arrow-left me-1"></i> Return to Homepage</a>
    </form>
</div>

</body>
</html>
