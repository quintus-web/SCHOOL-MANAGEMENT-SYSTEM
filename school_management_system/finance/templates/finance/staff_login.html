<!-- finance/templates/finance/staff_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescent Heights — Secure Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --navy: #0a1628;
            --blue-accent: #2563eb;
            --surface: #ffffff;
            --surface-2: #f0f4ff;
            --border: #dde5f7;
            --text: #0a1628;
            --text-muted: #64748b;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface-2);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(10, 22, 40, 0.05);
            max-width: 440px;
            width: 100%;
            padding: 3rem 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--blue-accent);
        }

        .security-badge {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: #eff6ff;
            color: var(--blue-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .login-container h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 0.25rem;
        }

        .role-badge {
            display: inline-block;
            background: var(--navy);
            color: #fcd34d; /* Golden text context color tint */
            font-family: monospace;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 6px;
            margin-bottom: 2rem;
        }

        .form-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .input-group-text {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 10px 0 0 10px;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .form-control {
            border: 1px solid var(--border);
            border-radius: 0 10px 10px 0;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: var(--text);
        }

        .form-control:focus {
            border-color: var(--blue-accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .btn-submit {
            background: var(--blue-accent);
            color: #ffffff;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0.8rem;
            border-radius: 100px;
            width: 100%;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .btn-submit:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-back {
            display: block;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .btn-back:hover {
            color: var(--navy);
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="text-center">
        <div class="security-badge">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h2>Workspace Authorization</h2>
        <p class="text-muted small mb-2">Please sign in to access your dashboard node.</p>
        
        <!-- Adaptive Badge displaying clicked homepage context -->
        <span class="role-badge">
            Role: {{ target_role|default:"System Admin" }}
        </span>
    </div>

    <!-- Live Feedback Alert Framework Blocks -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}info{% endif %} border-0 py-2 small text-center rounded-3 mb-3" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Passes chosen role as target parameter URL payload query context string -->
    <form method="POST" action="{% url 'staff_login' %}?role={{ target_role|default:'Admin' }}">
        {% csrf_token %}
        
        <!-- Username Identifier Input -->
        <div class="mb-3">
            <label class="form-label">System Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
            </div>
        </div>

        <!-- Secret Token Password Input -->
        <div class="mb-4">
            <label class="form-label">Password Key</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
        </div>

        <button type="submit" class="btn btn-submit">Initialize Secure Session</button>
        <a href="{% url 'public_home' %}" class="btn-back"><i class="bi bi-arrow-left me-1"></i> Return to Public Gateway</a>
    </form>
</div>

</body>
</html>
