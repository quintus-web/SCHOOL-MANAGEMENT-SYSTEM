{% extends 'finance/base.html' %}
{% block title %}Add New Learner{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto; padding: 30px;">
    <h2 style="margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">👤 Register New Learner</h2>
    
    <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        <!-- SECTION 1: IDENTITY -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
            <input type="text" name="adm_number" placeholder="Adm Number (e.g. 050)" required style="padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text);">
            <input type="text" name="first_name" placeholder="First Name" required style="padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text);">
            <input type="text" name="last_name" placeholder="Last Name" required style="padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text);">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <select name="grade" style="padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text);">
                <option value="Playgroup">Playgroup</option>
                <option value="PP1">PP1</option>
                <option value="PP2">PP2</option>
                <option value="Grade 1">Grade 1</option>
                <option value="Grade 2">Grade 2</option>
                <option value="Grade 3">Grade 3</option>
                <option value="Grade 4">Grade 4</option>
                <option value="Grade 5">Grade 5</option>
                <option value="Grade 6">Grade 6</option>
            </select>
            <input type="text" name="blood_group" placeholder="Blood Group (e.g. O+)" style="padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text);">
        </div>

        <!-- SECTION 2: GUARDIAN -->
        <div style="margin-top: 10px;">
            <h4 style="color: var(--muted); margin-bottom: 10px;">👨‍👩‍👧 Family & Contact</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" name="guardian_name" placeholder="Primary Guardian Name" style="padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text);">
                <input type="text" name="parent_phone" placeholder="Mobile Contact" style="padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text);">
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="padding: 15px; font-weight: bold; font-size: 16px; margin-top: 10px;">💾 Register Learner to Registry</button>
    </form>
</div>
{% endblock %}
