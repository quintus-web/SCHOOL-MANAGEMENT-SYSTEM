{% extends 'finance/base.html' %}
{% block content %}
<div class="card">
    <h3>Attendance Performance (Monthly)</h3>
    <table style="width: 100%;">
        <thead>
            <tr><th>Student</th><th>Attendance %</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.first_name }} {{ s.last_name }}</td>
                <td style="width: 200px;">
                    <div style="background: #eee; height: 8px; border-radius: 4px;">
                        <div style="background: {% if s.percentage > 80 %}var(--accent3){% else %}var(--danger){% endif %}; 
                                    width: {{ s.percentage }}%; height: 8px; border-radius: 4px;">
                        </div>
                    </div>
                </td>
                <td><strong>{{ s.percentage|floatformat:0 }}%</strong></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
